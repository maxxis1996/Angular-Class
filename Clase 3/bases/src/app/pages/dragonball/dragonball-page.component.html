<h1>Hola mi amigo es Yamcha</h1>
<hr/>

<section class="row">
    <div class="col-12 col-sm-6">
        <h3>Agregar:{{ name() }}</h3>
        <input type="text" class="form-control" placeholder="Nombre" [value]="name()" 
        (change)="name.set(txtName.value)" 
        (input)="name.set(txtName.value)"
        #txtName
        >
        <h3>Poder: {{power ()}}</h3>
        <input type="number" class="form-control" placeholder="Poder" [value]="power()"
        (change)="power.set(+txtPower.value)"
        (input)="power.set(+txtPower.value)"
        #txtPower
        >

        <button class="mt-2 btn btn-primary" (click)="addCharacter()">Agregar</button>
    </div>

    <div class="col-12 col-sm-6">
        <h3>Listado</h3>
        <ol>
            @for (character of characters(); track character.id) {
            @if(character.power > 500){
                <ul>
                    <span >{{ character.name }} </span>
                    <strong class="text-danger"> {{ character.power }}</strong>
                </ul>
                } @else {
                    <li>hay mas elementos inferiores</li>
                }
           }
            
        </ol>
    </div>
</section>
